<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    
    <!-- Reliable model-viewer script -->
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #0a0a0a;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        
        model-viewer {
            width: 100%;
            height: 100%;
            background-color: #0a0a0a;
        }
        
        /* Loading spinner - visual only -->
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.15);
            border-top: 5px solid #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            z-index: 100;
        }
        
        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
    </style>
</head>
<body>
    <div style="position: relative; width: 100%; height: 100%;">
        <!-- Loading spinner -->
        <div class="loading" id="loader"></div>
        
        <!-- Interactive SolidWorks GLB Model REPLACE src= WITH GLB FILE -->
        <model-viewer
            id="modelViewer"
            src="TWR-16-Front-Wing-Master.glb"
            alt=""
            camera-controls="true"
            auto-rotate="true"
            auto-rotate-delay="2000"
            rotation-per-second="20deg"
            shadow-intensity="1.2"
            exposure="0.9"
            environment-intensity="0.85"
            loading="eager"
            ar="true"
            ar-modes="webxr scene-viewer quick-look">
        </model-viewer>
    </div>

    <script>
        const modelViewer = document.getElementById('modelViewer');
        const loader = document.getElementById('loader');
        
        // Show spinner until model loads
        loader.style.display = 'block';
        
        modelViewer.addEventListener('load', () => {
            loader.style.display = 'none';
            console.log('✅ Model loaded successfully - Interaction enabled');
        });
        
        // Safety fallback
        setTimeout(() => {
            if (loader.style.display !== 'none') {
                loader.style.display = 'none';
            }
        }, 15000);
        
        // Double-click for fullscreen
        document.addEventListener('dblclick', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else {
                document.exitFullscreen();
            }
        });
        
        // Press F key for fullscreen
        document.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'f') {
                e.preventDefault();
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(() => {});
                } else {
                    document.exitFullscreen();
                }
            }
        });
    </script>
</body>
</html>
