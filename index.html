<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title></title>
    
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #0a0a0a;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            font-family: system-ui, -apple-system, sans-serif;
            touch-action: manipulation;
        }
        
        .sidebar {
            background-color: #111111;
            border-right: 1px solid #222;
            padding: 20px 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: transform 0.3s ease;
            z-index: 200;
        }
        
        @media (min-width: 769px) {
            body { display: flex; }
            .sidebar { width: 240px; min-width: 240px; position: relative; }
        }
        
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar {
                position: fixed;
                top: 0; left: 0;
                width: 280px; height: 100%;
                transform: translateX(-100%);
                padding-top: 70px;
                box-shadow: 2px 0 10px rgba(0,0,0,0.5);
            }
            .sidebar.open { transform: translateX(0); }
        }
        
        .hamburger {
            position: fixed;
            top: 16px; left: 16px;
            z-index: 300;
            background: #1a1a1a;
            border: none;
            width: 50px; height: 50px;
            border-radius: 10px;
            display: flex;
            align-items: center; justify-content: center;
            color: #fff;
            font-size: 28px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        
        @media (min-width: 769px) { .hamburger { display: none; } }
        
        .tab, .bg-toggle {
            padding: 14px 16px;
            color: #cccccc;
            background-color: #1a1a1a;
            border: none;
            text-align: left;
            cursor: pointer;
            border-radius: 8px;
            font-size: 15px;
            white-space: nowrap;
            min-height: 52px;
            display: flex;
            align-items: center;
        }
        
        .tab:hover, .bg-toggle:hover { background-color: #252525; color: #ffffff; }
        .tab.active { background-color: #333333; color: white; font-weight: 500; }
        
        .bg-toggle { margin-top: auto; font-weight: 500; justify-content: center; }
        
        /* Viewer Area */
        .viewer-container {
            flex: 1;
            position: relative;
            display: flex;
            overflow: hidden;
        }
        
        model-viewer {
            flex: 1;
            height: 100%;
            background-color: #0a0a0a;
            display: block;
        }
        
        /* Compare Mode - Two models side by side */
        .compare-mode .viewer-container {
            flex-direction: row;
        }
        
        .compare-mode model-viewer {
            border-right: 1px solid #222;
        }
        
        .compare-mode model-viewer:last-child {
            border-right: none;
        }
        
        .loading {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 50px; height: 50px;
            border: 5px solid rgba(255,255,255,0.15);
            border-top: 5px solid #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            z-index: 100;
        }
        
        @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }
    </style>
</head>
<body>
    <button class="hamburger" id="hamburger">☰</button>

    <div class="sidebar" id="sidebar">
        <div class="tab active" data-src="TWR-17-full.glb">TWR17</div>
        <div class="tab" data-src="TWR-16-full.glb">TWR16</div>
        <div class="tab" data-src="TWR-16-Front-Wing-Master.glb">TWR16 Front Wing</div>

        
        <!-- New Compare Tab -->
        <div class="tab" data-mode="compare" 
             data-src1="TWR-16-full.glb" 
             data-src2="TWR-17-full.glb">
            Compare: TWR-16 + TWR-17
        </div>
        
        <div class="bg-toggle" id="bgToggle">Background: Black</div>
    </div>

    <div class="viewer-container" id="viewerContainer">
        <div class="loading" id="loader"></div>
        
        <!-- Single Model Viewer -->
        <model-viewer id="model1"
            src="TWR-17-full.glb"
            alt=""
            camera-controls="true"
            auto-rotate="true"
            auto-rotate-delay="3000"
            rotation-per-second="15deg"
            shadow-intensity="0.8"
            exposure="0.85"
            environment-intensity="0.7"
            loading="eager"
            camera-orbit="45deg 55deg auto"
            field-of-view="35deg">
        </model-viewer>
        
        <!-- Second Model Viewer (hidden by default) -->
        <model-viewer id="model2"
            src="TWR-16-full.glb"
            alt=""
            camera-controls="true"
            auto-rotate="false"
            shadow-intensity="0.8"
            exposure="0.85"
            environment-intensity="0.7"
            loading="eager"
            camera-orbit="45deg 55deg auto"
            field-of-view="35deg"
            style="display: none;">
        </model-viewer>
    </div>

    <script>
        const model1 = document.getElementById('model1');
        const model2 = document.getElementById('model2');
        const loader = document.getElementById('loader');
        const tabs = document.querySelectorAll('.tab');
        const bgToggle = document.getElementById('bgToggle');
        const hamburger = document.getElementById('hamburger');
        const sidebar = document.getElementById('sidebar');
        const viewerContainer = document.getElementById('viewerContainer');
        
        let isBlackBackground = true;
        let currentMode = 'single';

        loader.style.display = 'block';

        // Load handler
        function handleLoad(e) {
            loader.style.display = 'none';
            console.log('Model loaded:', e.target.id);
        }

        model1.addEventListener('load', handleLoad);
        model2.addEventListener('load', handleLoad);

        // Synchronize camera between two models in compare mode
        function syncCameras(source, target) {
            if (currentMode === 'compare') {
                target.cameraOrbit = source.cameraOrbit;
                target.cameraTarget = source.cameraTarget;
                target.fieldOfView = source.fieldOfView;
            }
        }

        model1.addEventListener('camera-change', () => syncCameras(model1, model2));
        model2.addEventListener('camera-change', () => syncCameras(model2, model1));

        // Tab Click Handler
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const mode = tab.dataset.mode;
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                loader.style.display = 'block';

                if (mode === 'single') {
                    currentMode = 'single';
                    viewerContainer.classList.remove('compare-mode');
                    model2.style.display = 'none';
                    
                    model1.src = tab.dataset.src;
                    model1.autoRotate = true;
                    
                } else if (mode === 'compare') {
                    currentMode = 'compare';
                    viewerContainer.classList.add('compare-mode');
                    model2.style.display = 'block';
                    
                    model1.src = tab.dataset.src1;
                    model2.src = tab.dataset.src2;
                    
                    model1.autoRotate = false;
                    model2.autoRotate = false;
                }
                
                if (window.innerWidth <= 768) sidebar.classList.remove('open');
            });
        });

        // Background Toggle
        bgToggle.addEventListener('click', () => {
            isBlackBackground = !isBlackBackground;
            const color = isBlackBackground ? '#0a0a0a' : '#f8f8f8';
            model1.style.backgroundColor = color;
            model2.style.backgroundColor = color;
            bgToggle.textContent = isBlackBackground ? 'Background: Black' : 'Background: White';
            if (window.innerWidth <= 768) sidebar.classList.remove('open');
        });

        // Hamburger
        hamburger.addEventListener('click', () => sidebar.classList.toggle('open'));

        document.addEventListener('click', (e) => {
            if (window.innerWidth <= 768 && 
                !sidebar.contains(e.target) && 
                e.target !== hamburger) {
                sidebar.classList.remove('open');
            }
        });

        // Double tap fullscreen
        document.addEventListener('dblclick', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else {
                document.exitFullscreen();
            }
        });
    </script>
</body>
</html>
